name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            liblapacke-dev \
            libopenblas-dev \
            libsuitesparse-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install lapack openblas suite-sparse

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install openblas --triplet x64-windows

      - name: Build in release mode
        run: cargo build --release --verbose

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            liblapacke-dev \
            libopenblas-dev \
            libsuitesparse-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install lapack openblas suite-sparse

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install openblas --triplet x64-windows

      - name: Run tests
        run: cargo test --all --verbose

  release:
    name: Release on tag
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            liblapacke-dev \
            libopenblas-dev \
            libsuitesparse-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install lapack openblas suite-sparse

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install openblas --triplet x64-windows

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Archive binary (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/warm dist/warm
          cd dist
          tar -czf warm-linux-x86_64.tar.gz warm

      - name: Archive binary (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/release/warm dist/warm
          cd dist
          tar -czf warm-macos-x86_64.tar.gz warm

      - name: Archive binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\release\warm.exe dist\warm.exe
          powershell -Command "Compress-Archive -Path dist\warm.exe -DestinationPath dist\warm-windows-x86_64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

